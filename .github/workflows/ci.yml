name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint-php:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Add vendor/bin to PATH
        run: echo "$(pwd)/vendor/bin" >> $GITHUB_PATH

      - name: Run PHP linting (phpcbf + phpcs + phpstan)
        run: pnpm run lint:php

  lint-ts:
    name: TypeScript Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run TypeScript ESLint
        run: pnpm run lint:ts

      - name: Check for uncommitted changes after lint
        run: |
          if ! git diff --exit-code; then
            echo "::error::lint:ts produced auto-fixes that were not committed. Please run 'pnpm run lint:ts' locally and commit the changes."
            git diff
            exit 1
          fi

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run Prettier-ESLint format
        run: pnpm run format

      - name: Check for uncommitted changes after format
        run: |
          if ! git diff --exit-code; then
            echo "::error::Format check failed. Please run 'pnpm run format' locally and commit the changes."
            git diff
            exit 1
          fi

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright browsers
        run: cd tests/e2e && npx playwright install --with-deps chromium

      - name: Start WordPress environment
        run: npx wp-env start
        timeout-minutes: 10

      - name: Run E2E tests
        run: pnpm run test:e2e

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Stop WordPress environment
        if: always()
        run: npx wp-env stop
