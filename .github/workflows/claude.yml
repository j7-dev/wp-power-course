name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 解析留言中的 Agent 參數
        id: parse_agent
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          REVIEW_BODY: ${{ github.event.review.body }}
        run: |
          if [ "${{ github.event_name }}" = "issues" ]; then
            COMMENT="$ISSUE_BODY"
          elif [ "${{ github.event_name }}" = "pull_request_review" ]; then
            COMMENT="$REVIEW_BODY"
          else
            COMMENT="$COMMENT_BODY"
          fi

          # 先檢查有沒有明確指定 --agent
          AGENT_NAME=$(echo "$COMMENT" | grep -oP -- '--agent \K\S+' || echo "")

          # 如果沒有明確指定，就用關鍵字判斷
          if [ -z "$AGENT_NAME" ]; then
            # 擷取 @claude 後面的文字來比對關鍵字
            AFTER_CLAUDE=$(echo "$COMMENT" | grep -oP '@claude\s+\K.*' || echo "")

            if echo "$AFTER_CLAUDE" | grep -qP '(釐清|規格)'; then
              AGENT_NAME="wp-workflows:clarifier"
            elif echo "$AFTER_CLAUDE" | grep -qP '(規劃|實作)'; then
              AGENT_NAME="wp-workflows:planner"
            fi
          fi

          if [ -n "$AGENT_NAME" ]; then
            echo "擷取到 Agent: $AGENT_NAME"
            echo "AGENT_ARG=--agent $AGENT_NAME" >> $GITHUB_ENV
          else
            echo "未指定 Agent，將使用預設模式"
            echo "AGENT_ARG=" >> $GITHUB_ENV
          fi

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          settings: .claude/settings.json
          plugin_marketplaces: |
            https://github.com/j7-dev/wp-workflows.git
          plugins: |
            wp-workflows
          claude_args: |
            --dangerously-skip-permissions
            --max-turns 20
            --model claude-opus-4-6
            ${{ env.AGENT_ARG }}
