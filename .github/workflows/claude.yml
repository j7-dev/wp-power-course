name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 解析留言中的 Agent 參數
        id: parse_agent
        run: |
          # 讀取留言內容
          COMMENT="${{ github.event.comment.body }}"

          # 使用正則表達式尋找 "--agent 某個名稱" (例如 --agent clarifier)
          # 如果沒找到，預設不帶入 agent (或是你可以設定一個預設的 agent)
          AGENT_NAME=$(echo "$COMMENT" | grep -oP -- '--agent \K\S+' || echo "")

          if [ -n "$AGENT_NAME" ]; then
            echo "擷取到指定 Agent: $AGENT_NAME"
            echo "AGENT_ARG=--agent $AGENT_NAME" >> $GITHUB_ENV
          else
            echo "未指定 Agent，將使用預設模式"
            echo "AGENT_ARG=" >> $GITHUB_ENV
          fi

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          settings: .claude/settings.json
          plugin_marketplaces: |
            https://github.com/j7-dev/wp-workflows.git
          plugins: |
            wp-workflows
          claude_args: |
            --dangerously-skip-permissions
            --allowedTools
            --max-turns 20
            --model claude-opus-4-6
            --teammate-mode in-process
            ${{ env.AGENT_ARG }}
