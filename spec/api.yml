openapi: 3.0.3

info:
  title: Power Course REST API
  description: |
    WordPress LMS Plugin — 整合 WooCommerce 銷售課程、管理章節、追蹤學員進度、自動化 Email 通知。

    ## 錯誤碼對應規則
    - **400** = 前置（參數）Rules 驗證失敗（型別/格式/必填）
    - **403** = 前置（狀態）Rules 不符（資源不存在、權限不足、到期等）
    - **404** = 資源找不到

    ## 認證
    所有管理端 API 需要 WordPress 登入 Cookie 加上 `X-WP-Nonce` Header。
    學員 API（進度查詢、切換章節）需要登入學員身份。
  version: "0.11.25"
  contact:
    name: Power Course

servers:
  - url: /wp-json/power-course
    description: Power Course REST API

security:
  - wpNonce: []

tags:
  - name: Courses
    description: 課程管理
  - name: Chapters
    description: 章節管理
  - name: Students
    description: 學員管理
  - name: Settings
    description: 外掛設定
  - name: Products
    description: 商品綁定
  - name: Reports
    description: 營收報表

# ============================================================
# COMPONENTS
# ============================================================
components:
  securitySchemes:
    wpNonce:
      type: apiKey
      in: header
      name: X-WP-Nonce
      description: WordPress REST API Nonce

  # ---------- Reusable Headers ----------
  headers:
    X-WP-Total:
      description: 資源總筆數
      schema:
        type: integer
        example: 42
    X-WP-TotalPages:
      description: 總頁數
      schema:
        type: integer
        example: 5

  # ---------- Reusable Schemas ----------
  schemas:

    VideoObject:
      type: object
      description: 影片資料物件
      required:
        - type
      properties:
        type:
          type: string
          enum: [bunny, youtube, vimeo, code, none]
          description: 影片來源類型
        id:
          type: string
          nullable: true
          description: 影片 ID 或 URL（type 為 none 時可為 null）
        meta:
          type: object
          nullable: true
          additionalProperties: true
          description: 額外影片 metadata（依 type 而異）

    BindCourseData:
      type: object
      description: 商品綁定課程的期限設定
      required:
        - course_id
        - limit_type
      properties:
        course_id:
          type: integer
          description: 課程 ID（必須 _is_course = yes）
        limit_type:
          type: string
          enum: [unlimited, fixed, assigned, follow_subscription]
        limit_value:
          type: integer
          nullable: true
          description: 期限數值（limit_type 為 fixed 時必填）
        limit_unit:
          type: string
          enum: [day, month, year, timestamp]
          nullable: true
          description: 期限單位（limit_type 為 fixed 時必填）

    CourseBase:
      type: object
      description: 課程基本欄位（列表用）
      properties:
        id:
          type: integer
        name:
          type: string
        status:
          type: string
          enum: [publish, draft]
        price:
          type: string
          description: 售價（WooCommerce 格式字串）
          example: "1200"
        regular_price:
          type: string
          description: 原價
          example: "1500"
        limit_type:
          type: string
          enum: [unlimited, fixed, assigned, follow_subscription]
        limit_value:
          type: integer
          nullable: true
        limit_unit:
          type: string
          enum: [day, month, year, timestamp]
          nullable: true
        course_schedule:
          type: integer
          description: 開課時間 Unix timestamp（0 = 立即開課）
          example: 0
        teacher_ids:
          type: array
          items:
            type: integer
          description: 講師 user ID 列表
        is_popular:
          type: string
          enum: [yes, no]
        is_featured:
          type: string
          enum: [yes, no]
        is_free:
          type: string
          enum: [yes, no]
        total_students:
          type: integer
          description: 選課人數
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CourseDetail:
      allOf:
        - $ref: '#/components/schemas/CourseBase'
        - type: object
          description: 課程完整詳情（含章節與銷售方案）
          properties:
            _is_course:
              type: string
              enum: [yes]
            description:
              type: string
            short_description:
              type: string
            feature_video:
              $ref: '#/components/schemas/VideoObject'
            trial_video:
              $ref: '#/components/schemas/VideoObject'
            editor:
              type: string
              enum: [power-editor, elementor]
              nullable: true
            chapters:
              type: array
              description: 巢狀章節樹（按 menu_order ASC 排序）
              items:
                $ref: '#/components/schemas/ChapterNode'
            bundle_products:
              type: array
              description: 關聯的銷售方案列表
              items:
                $ref: '#/components/schemas/BundleProductSummary'

    ChapterBase:
      type: object
      description: 章節基本欄位
      properties:
        id:
          type: integer
        post_title:
          type: string
          description: 章節名稱
        post_parent:
          type: integer
          description: 父章節 ID（頂層時為課程商品 ID）
        parent_course_id:
          type: integer
          description: 根課程 ID（任意巢狀深度皆有效）
        chapter_video:
          $ref: '#/components/schemas/VideoObject'
        chapter_length:
          type: integer
          description: 影片長度（秒）
          example: 3600
        enable_comment:
          type: string
          enum: [yes, no]
        menu_order:
          type: integer
          description: 顯示排序（ASC）

    ChapterNode:
      allOf:
        - $ref: '#/components/schemas/ChapterBase'
        - type: object
          properties:
            children:
              type: array
              description: 子章節列表（遞迴結構）
              items:
                $ref: '#/components/schemas/ChapterNode'

    BundleProductSummary:
      type: object
      description: 銷售方案摘要
      properties:
        id:
          type: integer
        name:
          type: string
        bundle_type:
          type: string
        link_course_ids:
          type: integer
        price:
          type: string
        regular_price:
          type: string

    StudentEnrollment:
      type: object
      description: 學員選課資料
      properties:
        user_id:
          type: integer
        display_name:
          type: string
        email:
          type: string
          format: email
        expire_date:
          description: |
            到期時間：
            - `0` = 永久存取
            - 10位 Unix timestamp = 指定到期時間
            - `"subscription_123"` = 跟隨訂閱
          oneOf:
            - type: integer
              description: 0 = 永久；10位 Unix timestamp
              example: 0
            - type: string
              pattern: '^subscription_\d+$'
              example: subscription_123
        course_granted_at:
          type: string
          format: date-time
          nullable: true
          description: 課程開通時間
        finished_at:
          type: string
          format: date-time
          nullable: true
          description: 課程完成時間（進度達 100% 時設定）
        course_progress:
          type: number
          format: float
          description: 進度百分比（0–100）
          example: 66.67

    StudentLog:
      type: object
      description: 學員活動紀錄
      properties:
        id:
          type: integer
        user_id:
          type: integer
        course_id:
          type: integer
        chapter_id:
          type: integer
          nullable: true
          description: 章節 ID（課程級別事件為 null）
        log_type:
          type: string
          enum: [course_granted, course_finish, course_launch, chapter_enter, chapter_finish]
        title:
          type: string
        content:
          type: string
          nullable: true
        user_ip:
          type: string
          example: "192.168.1.1"
        created_at:
          type: string
          format: date-time

    Pagination:
      type: object
      properties:
        total:
          type: integer
          description: 總筆數
        total_pages:
          type: integer
          description: 總頁數

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          description: 錯誤代碼
          example: rest_invalid_param
        message:
          type: string
          description: 錯誤訊息（可能為繁中）
          example: "user_ids 不可為空陣列"
        data:
          type: object
          nullable: true
          properties:
            status:
              type: integer
              description: HTTP 狀態碼
              example: 400

    Settings:
      type: object
      description: Power Course 外掛設定
      properties:
        course_access_trigger:
          type: string
          description: 觸發課程開通的 WooCommerce 訂單狀態（e.g. completed, processing）
          example: completed
        course_permalink_structure:
          type: string
          description: 課程固定連結結構
          example: ""
        hide_myaccount_courses:
          type: string
          enum: [yes, no]
        fix_video_and_tabs_mobile:
          type: string
          enum: [yes, no]
        pc_header_offset:
          type: string
          description: 固定頂欄高度偏移 px
          example: "0"
        hide_courses_in_main_query:
          type: string
          enum: [yes, no]
        hide_courses_in_search_result:
          type: string
          enum: [yes, no]
        pc_watermark_qty:
          type: integer
          minimum: 0
          description: 影片浮水印數量（0 = 關閉）
        pc_watermark_text:
          type: string
          description: 浮水印文字模板（支援 {display_name}, {post_title}, {ip}, {email}）
          example: "{display_name} {post_title} IP:{ip}"
        pc_pdf_watermark_qty:
          type: integer
          minimum: 0
        pc_pdf_watermark_text:
          type: string

    UploadStudentsResult:
      type: object
      description: 批量匯入學員結果摘要
      properties:
        success_count:
          type: integer
          description: 成功匯入筆數
        error_count:
          type: integer
          description: 失敗筆數
        errors:
          type: array
          description: 失敗明細
          items:
            type: object
            properties:
              row:
                type: integer
                description: CSV 行號
              email:
                type: string
              reason:
                type: string
        action_scheduler_id:
          type: integer
          nullable: true
          description: Action Scheduler 背景任務 ID（大量匯入時回傳）

  # ---------- Reusable Responses ----------
  responses:
    400ValidationError:
      description: |
        請求參數驗證失敗（前置參數 Rules）。
        常見原因：必填欄位為空、格式不合法、enum 值不在允許清單中。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            emptyArray:
              summary: 陣列為空
              value:
                code: rest_invalid_param
                message: "user_ids 不可為空陣列"
                data:
                  status: 400
            invalidFormat:
              summary: 格式不合法
              value:
                code: rest_invalid_param
                message: "expire_date 必須是 10 位正整數或 subscription_{id} 格式"
                data:
                  status: 400

    403PreconditionFailed:
      description: |
        前置狀態條件不符（前置狀態 Rules）。
        常見原因：學員無存取權、課程已到期、資源不存在、未登入。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            noAccess:
              summary: 無課程存取權
              value:
                code: rest_forbidden
                message: "未擁有課程存取權"
                data:
                  status: 403
            expired:
              summary: 課程已到期
              value:
                code: rest_forbidden
                message: "課程已到期"
                data:
                  status: 403
            notLoggedIn:
              summary: 未登入
              value:
                code: rest_forbidden
                message: "請先登入"
                data:
                  status: 403

    404NotFound:
      description: 指定資源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            courseNotFound:
              summary: 課程不存在
              value:
                code: rest_not_found
                message: "找不到課程"
                data:
                  status: 404
            chapterNotFound:
              summary: 章節不存在
              value:
                code: rest_not_found
                message: "找不到章節"
                data:
                  status: 404

# ============================================================
# PATHS
# ============================================================
paths:

  # ----------------------------------------------------------
  # /courses  (GET list + POST create + DELETE bulk)
  # ----------------------------------------------------------
  /courses:
    get:
      summary: 查詢課程列表
      operationId: listCourses
      tags: [Courses]
      parameters:
        - name: posts_per_page
          in: query
          description: 每頁筆數（預設 10）
          schema:
            type: integer
            default: 10
            minimum: 1
        - name: paged
          in: query
          description: 頁碼（預設 1）
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: orderby
          in: query
          description: 排序依據欄位
          schema:
            type: string
            enum: [date, title, price, menu_order]
            default: date
        - name: order
          in: query
          description: 排序方向
          schema:
            type: string
            enum: [ASC, DESC]
            default: DESC
        - name: status
          in: query
          description: 篩選課程狀態（預設同時回傳 publish 和 draft）
          style: form
          explode: false
          schema:
            oneOf:
              - type: string
                enum: [publish, draft]
              - type: array
                items:
                  type: string
                  enum: [publish, draft]
        - name: search
          in: query
          description: 課程名稱關鍵字搜尋
          schema:
            type: string
      responses:
        "200":
          description: 課程列表（含分頁 Headers）
          headers:
            X-WP-Total:
              $ref: '#/components/headers/X-WP-Total'
            X-WP-TotalPages:
              $ref: '#/components/headers/X-WP-TotalPages'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CourseBase'
        "400":
          $ref: '#/components/responses/400ValidationError'

    post:
      summary: 建立課程
      operationId: createCourse
      tags: [Courses]
      description: |
        建立新的 WooCommerce 課程商品，設定名稱、售價、存取期限、開課時間、講師等基本資訊。

        **前置（狀態）:** 無

        **前置（參數）:**
        - `name` 不可為空
        - `limit_type` 為 `fixed` 時，`limit_value` 與 `limit_unit` 不可為空
        - `limit_type` 為 `assigned` 時，`limit_value` 必須是有效的 10 位 Unix timestamp
        - `price` 若有設定須為非負數
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: 課程名稱（必填）
                  example: PHP 基礎入門
                status:
                  type: string
                  enum: [publish, draft]
                  default: draft
                description:
                  type: string
                short_description:
                  type: string
                price:
                  type: string
                  description: 售價（非負數字串）
                  example: "1200"
                regular_price:
                  type: string
                  example: "1500"
                limit_type:
                  type: string
                  enum: [unlimited, fixed, assigned, follow_subscription]
                  default: unlimited
                limit_value:
                  type: integer
                  nullable: true
                  description: 期限數值（fixed 時必填）
                limit_unit:
                  type: string
                  enum: [day, month, year, timestamp]
                  nullable: true
                  description: 期限單位（fixed 時必填）
                course_schedule:
                  type: integer
                  description: 開課時間 Unix timestamp（0 = 立即開課）
                  default: 0
                teacher_ids:
                  type: array
                  items:
                    type: integer
                  description: 講師 user ID 陣列
                is_popular:
                  type: string
                  enum: [yes, no]
                  default: no
                is_featured:
                  type: string
                  enum: [yes, no]
                  default: no
                is_free:
                  type: string
                  enum: [yes, no]
                  default: no
                feature_video:
                  $ref: '#/components/schemas/VideoObject'
                trial_video:
                  $ref: '#/components/schemas/VideoObject'
      responses:
        "200":
          description: 課程建立成功，回傳完整課程資料（含新建 ID）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseDetail'
        "400":
          $ref: '#/components/responses/400ValidationError'

    delete:
      summary: 刪除課程（批量）
      operationId: deleteCourses
      tags: [Courses]
      description: |
        刪除一或多個課程商品（wp_delete_post）。關聯章節與學員紀錄不自動刪除。

        **前置（狀態）:** 所有 `ids` 對應的課程必須存在

        **前置（參數）:** `ids` 不可為空陣列
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ids
              properties:
                ids:
                  type: array
                  minItems: 1
                  items:
                    type: integer
                  description: 要刪除的課程 ID 陣列
                  example: [100, 101]
      responses:
        "200":
          description: 刪除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  deleted_ids:
                    type: array
                    items:
                      type: integer
        "400":
          $ref: '#/components/responses/400ValidationError'
        "403":
          $ref: '#/components/responses/403PreconditionFailed'

  # ----------------------------------------------------------
  # /courses/add-students  (固定路徑，優先於 /courses/{id})
  # ----------------------------------------------------------
  /courses/add-students:
    post:
      summary: 新增學員到課程
      operationId: addStudentsToCourse
      tags: [Students]
      description: |
        將學員加入課程，建立存取權（`avl_course_ids` user meta + `pc_avl_coursemeta` table）。
        支援管理員手動新增或 WooCommerce 訂單自動觸發。

        **前置（狀態）:**
        - `user_ids` 中每個 ID 對應的 WordPress 用戶必須存在
        - `course_ids` 中每個 ID 對應的課程必須存在且 `_is_course = 'yes'`

        **前置（參數）:**
        - `user_ids` 不可為空陣列
        - `course_ids` 不可為空陣列
        - `expire_date` 若為 timestamp 必須是 10 位正整數；若為 subscription 格式需符合 `subscription_{id}`

        **後置觸發:**
        - `power_course_add_student_to_course` action（priority 20）
        - `power_course_after_add_student_to_course` action
        - PowerEmail `course_granted` 排程
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_ids
                - course_ids
              properties:
                user_ids:
                  type: array
                  minItems: 1
                  items:
                    type: integer
                  example: [2, 3]
                course_ids:
                  type: array
                  minItems: 1
                  items:
                    type: integer
                  example: [100]
                expire_date:
                  description: |
                    到期設定：
                    - `0` = 永久存取（預設）
                    - 10位 Unix timestamp = 到期時間
                    - `"subscription_123"` = 跟隨訂閱
                  oneOf:
                    - type: integer
                      description: 0 = 永久；10位 Unix timestamp
                    - type: string
                      pattern: '^subscription_\d+$'
                  default: 0
      responses:
        "200":
          description: 學員新增成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "成功新增 2 位學員到 1 個課程"
        "400":
          $ref: '#/components/responses/400ValidationError'
        "403":
          $ref: '#/components/responses/403PreconditionFailed'

  # ----------------------------------------------------------
  # /courses/remove-students
  # ----------------------------------------------------------
  /courses/remove-students:
    post:
      summary: 移除學員課程權限
      operationId: removeStudentsFromCourse
      tags: [Students]
      description: |
        撤銷學員的課程存取權（退款、帳號封停或手動移除時使用）。

        **前置（狀態）:** 學員必須已有該課程的存取權

        **前置（參數）:**
        - `user_ids` 不可為空陣列
        - `course_ids` 不可為空陣列

        **後置觸發:** `power_course_after_remove_student_from_course` action（學員章節進度不自動清除）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_ids
                - course_ids
              properties:
                user_ids:
                  type: array
                  minItems: 1
                  items:
                    type: integer
                  example: [2]
                course_ids:
                  type: array
                  minItems: 1
                  items:
                    type: integer
                  example: [100]
      responses:
        "200":
          description: 學員移除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        "400":
          $ref: '#/components/responses/400ValidationError'
        "403":
          $ref: '#/components/responses/403PreconditionFailed'

  # ----------------------------------------------------------
  # /courses/update-students
  # ----------------------------------------------------------
  /courses/update-students:
    post:
      summary: 更新學員到期日
      operationId: updateStudentExpireDate
      tags: [Students]
      description: |
        更新學員的課程存取到期時間（延長、縮短或改為永久）。

        **前置（狀態）:** 學員必須已有該課程的存取權

        **前置（參數）:**
        - `user_ids`、`course_ids` 不可為空
        - `timestamp` 必須為 0（永久）或 10位 Unix timestamp

        **後置觸發:** `power_course_after_update_student_from_course` action
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_ids
                - course_ids
                - timestamp
              properties:
                user_ids:
                  type: array
                  minItems: 1
                  items:
                    type: integer
                  example: [2]
                course_ids:
                  type: array
                  minItems: 1
                  items:
                    type: integer
                  example: [100]
                timestamp:
                  type: integer
                  description: 新到期時間：0 = 永久；10位 Unix timestamp = 指定到期時間
                  example: 1893456000
      responses:
        "200":
          description: 到期日更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        "400":
          $ref: '#/components/responses/400ValidationError'
        "403":
          $ref: '#/components/responses/403PreconditionFailed'

  # ----------------------------------------------------------
  # /courses/student-logs
  # ----------------------------------------------------------
  /courses/student-logs:
    get:
      summary: 查詢學員活動紀錄
      operationId: listStudentLogs
      tags: [Students]
      description: 查詢 pc_student_logs 表的學員活動稽核紀錄，支援多種篩選條件。
      parameters:
        - name: course_id
          in: query
          description: 篩選特定課程的紀錄
          schema:
            type: integer
        - name: user_id
          in: query
          description: 篩選特定學員的紀錄
          schema:
            type: integer
        - name: log_type
          in: query
          description: 篩選特定類型紀錄
          schema:
            type: string
            enum: [course_granted, course_finish, course_launch, chapter_enter, chapter_finish]
        - name: posts_per_page
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
        - name: paged
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
      responses:
        "200":
          description: 學員活動紀錄列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/StudentLog'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  # ----------------------------------------------------------
  # /courses/{id}  (GET detail + POST update)
  # 注意: /courses/add-students 等固定路徑的優先順序高於此路由
  # ----------------------------------------------------------
  /courses/{id}:
    get:
      summary: 取得課程詳情
      operationId: getCourse
      tags: [Courses]
      description: |
        取得單一課程的完整詳情，包含章節結構（巢狀）與銷售方案列表。

        **前置（狀態）:** 指定 id 對應的課程必須存在

        **前置（參數）:**
        - `id` 必須為正整數
        - 對應商品的 `_is_course` 必須為 `yes`
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
          description: 課程 ID
      responses:
        "200":
          description: 課程完整詳情（含章節樹與銷售方案）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseDetail'
        "400":
          $ref: '#/components/responses/400ValidationError'
        "403":
          $ref: '#/components/responses/403PreconditionFailed'
        "404":
          $ref: '#/components/responses/404NotFound'

    post:
      summary: 更新課程
      operationId: updateCourse
      tags: [Courses]
      description: |
        更新指定課程的基本資訊、定價、存取設定、媒體等（僅更新有傳入的欄位）。

        **前置（狀態）:** 指定 id 對應的課程必須存在且 `_is_course = 'yes'`

        **前置（參數）:**
        - `id` 不可為空且必須為正整數
        - 同 CreateCourse 的參數驗證規則

        **後置觸發:** `power_course_before_update_product_meta` action
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: 所有欄位皆為可選，僅更新有傳入的欄位
              properties:
                name:
                  type: string
                status:
                  type: string
                  enum: [publish, draft]
                description:
                  type: string
                short_description:
                  type: string
                price:
                  type: string
                regular_price:
                  type: string
                limit_type:
                  type: string
                  enum: [unlimited, fixed, assigned, follow_subscription]
                limit_value:
                  type: integer
                  nullable: true
                limit_unit:
                  type: string
                  enum: [day, month, year, timestamp]
                  nullable: true
                course_schedule:
                  type: integer
                teacher_ids:
                  type: array
                  items:
                    type: integer
                is_popular:
                  type: string
                  enum: [yes, no]
                is_featured:
                  type: string
                  enum: [yes, no]
                is_free:
                  type: string
                  enum: [yes, no]
                feature_video:
                  $ref: '#/components/schemas/VideoObject'
                trial_video:
                  $ref: '#/components/schemas/VideoObject'
      responses:
        "200":
          description: 課程更新成功，回傳完整更新後課程資料
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseDetail'
        "400":
          $ref: '#/components/responses/400ValidationError'
        "403":
          $ref: '#/components/responses/403PreconditionFailed'
        "404":
          $ref: '#/components/responses/404NotFound'

  # ----------------------------------------------------------
  # /courses/{id}/progress
  # ----------------------------------------------------------
  /courses/{id}/progress:
    get:
      summary: 取得課程進度（當前登入學員）
      operationId: getCourseProgress
      tags: [Courses]
      description: |
        查詢當前登入學員在特定課程的學習進度資料，包含進度百分比、已完成章節、最後造訪資訊。

        **前置（狀態）:**
        - 學員必須已有該課程的存取權
        - 學員必須已登入（非訪客）

        **前置（參數）:** `course_id`（路徑參數）不可為空

        **備註:** 若課程已到期，回應中 `expired: true`，但 HTTP 狀態仍為 200
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
          description: 課程 ID
      responses:
        "200":
          description: 課程進度資料（已到期時 expired = true）
          content:
            application/json:
              schema:
                type: object
                properties:
                  progress:
                    type: number
                    format: float
                    description: 進度百分比（0–100）
                    example: 66.67
                  finished_chapters:
                    type: array
                    description: 已完成章節 ID 列表
                    items:
                      type: integer
                    example: [201, 202]
                  total_chapters:
                    type: integer
                    description: 課程章節總數
                    example: 3
                  last_visit_info:
                    type: object
                    nullable: true
                    description: 最後造訪章節資訊
                    properties:
                      chapter_id:
                        type: integer
                        example: 201
                      last_visit_at:
                        type: string
                        format: date-time
                        example: "2024-04-01 10:00:00"
                  expire_date:
                    description: 學員存取到期時間（0 = 永久）
                    oneOf:
                      - type: integer
                        example: 0
                      - type: string
                        pattern: '^subscription_\d+$'
                  expired:
                    type: boolean
                    description: 課程是否已到期（true 時其他欄位仍回傳但應為最後已知值）
                    example: false
        "403":
          $ref: '#/components/responses/403PreconditionFailed'
        "404":
          $ref: '#/components/responses/404NotFound'

  # ----------------------------------------------------------
  # /chapters
  # ----------------------------------------------------------
  /chapters:
    post:
      summary: 建立章節
      operationId: createChapter
      tags: [Chapters]
      description: |
        在指定課程下建立新章節（支援巢狀結構）。

        **前置（狀態）:**
        - `parent_course_id` 對應的課程必須存在且 `_is_course = 'yes'`
        - 若 `post_parent` 為章節 ID，該章節必須存在且 `post_type = 'pc_chapter'`

        **前置（參數）:**
        - `post_title` 不可為空
        - `parent_course_id` 不可為空
        - `chapter_video.type` 必須為 bunny / youtube / vimeo / code / none 之一
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - post_title
                - parent_course_id
              properties:
                post_title:
                  type: string
                  description: 章節名稱（必填）
                  example: 第一章：環境設定
                post_parent:
                  type: integer
                  description: 父節點 ID（課程 ID 或父章節 ID）
                  example: 100
                parent_course_id:
                  type: integer
                  description: 根課程 ID（必填）
                  example: 100
                chapter_video:
                  $ref: '#/components/schemas/VideoObject'
                chapter_length:
                  type: integer
                  description: 影片長度（秒）
                  default: 0
                  example: 3600
                enable_comment:
                  type: string
                  enum: [yes, no]
                  default: no
                menu_order:
                  type: integer
                  description: 排序順序
                  default: 0
      responses:
        "200":
          description: 章節建立成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChapterBase'
        "400":
          $ref: '#/components/responses/400ValidationError'
        "403":
          $ref: '#/components/responses/403PreconditionFailed'

  # ----------------------------------------------------------
  # /chapters/sort  (固定路徑，優先於 /chapters/{id})
  # ----------------------------------------------------------
  /chapters/sort:
    post:
      summary: 排序章節
      operationId: sortChapters
      tags: [Chapters]
      description: |
        批量更新章節的 `menu_order`（拖拽排序後呼叫）。

        **前置（狀態）:** `chapters` 中每個 `id` 對應的章節都必須存在

        **前置（參數）:**
        - `chapters` 不可為空陣列
        - 每項必須包含有效的 `id` 與 `menu_order`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - chapters
              properties:
                chapters:
                  type: array
                  minItems: 1
                  description: 章節排序陣列
                  items:
                    type: object
                    required:
                      - id
                      - menu_order
                    properties:
                      id:
                        type: integer
                        description: 章節 ID
                      menu_order:
                        type: integer
                        description: 新的排序值
                  example:
                    - id: 201
                      menu_order: 2
                    - id: 202
                      menu_order: 0
                    - id: 203
                      menu_order: 1
      responses:
        "200":
          description: 章節排序更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        "400":
          $ref: '#/components/responses/400ValidationError'
        "403":
          $ref: '#/components/responses/403PreconditionFailed'

  # ----------------------------------------------------------
  # /chapters/{id}
  # ----------------------------------------------------------
  /chapters/{id}:
    post:
      summary: 更新章節
      operationId: updateChapter
      tags: [Chapters]
      description: |
        更新章節的標題、影片來源、時長等資訊（僅更新有傳入的欄位）。

        **前置（狀態）:** `id` 對應的章節必須存在且 `post_type = 'pc_chapter'`

        **前置（參數）:** `id` 不可為空
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
          description: 章節 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: 所有欄位皆為可選
              properties:
                post_title:
                  type: string
                chapter_video:
                  $ref: '#/components/schemas/VideoObject'
                chapter_length:
                  type: integer
                  description: 影片長度（秒）
                enable_comment:
                  type: string
                  enum: [yes, no]
                menu_order:
                  type: integer
      responses:
        "200":
          description: 章節更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChapterBase'
        "400":
          $ref: '#/components/responses/400ValidationError'
        "403":
          $ref: '#/components/responses/403PreconditionFailed'
        "404":
          $ref: '#/components/responses/404NotFound'

  # ----------------------------------------------------------
  # /toggle-finish-chapters/{id}
  # ----------------------------------------------------------
  /toggle-finish-chapters/{id}:
    post:
      summary: 切換章節完成狀態
      operationId: toggleFinishChapter
      tags: [Chapters]
      description: |
        切換章節的完成狀態（完成 ↔ 未完成），並重新計算課程整體進度。
        由已登入學員呼叫，user_id 從 session 取得。

        **前置（狀態）:**
        - 學員必須已有該章節所屬課程的存取權
        - 課程存取未到期（expire_date = 0 或 expire_date > now()）

        **前置（參數）:**
        - `chapter_id`（路徑參數）必須存在且 `post_type = 'pc_chapter'`
        - 必須已登入（非訪客）

        **後置觸發:**
        - 標記完成：`power_course_chapter_finished` action
        - 取消完成：`power_course_chapter_unfinished` action
        - 若進度達 100%：`power_course_course_finished` action + 設定 `AVLCourseMeta::finished_at`
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
          description: 章節 ID
      responses:
        "200":
          description: 章節完成狀態切換成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  finished:
                    type: boolean
                    description: 切換後的完成狀態（true = 已完成）
                  progress:
                    type: number
                    format: float
                    description: 更新後的課程進度百分比（0–100）
                    example: 66.67
                  course_finished:
                    type: boolean
                    description: 課程是否在此次操作後達到 100% 完成
                    example: false
        "400":
          $ref: '#/components/responses/400ValidationError'
        "403":
          $ref: '#/components/responses/403PreconditionFailed'
        "404":
          $ref: '#/components/responses/404NotFound'

  # ----------------------------------------------------------
  # /options
  # ----------------------------------------------------------
  /options:
    post:
      summary: 更新設定
      operationId: updateSettings
      tags: [Settings]
      description: |
        更新 Power Course 外掛的全局設定（power_course_settings option）。

        **前置（狀態）:** 無

        **前置（參數）:**
        - `course_access_trigger` 必須是有效的 WooCommerce 訂單狀態
        - `pc_watermark_qty` / `pc_pdf_watermark_qty` 必須為非負整數
        - 未知屬性會被忽略（不導致失敗）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Settings'
      responses:
        "200":
          description: 設定更新成功，回傳完整更新後設定
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Settings'
        "400":
          $ref: '#/components/responses/400ValidationError'

  # ----------------------------------------------------------
  # /products/bind-courses
  # ----------------------------------------------------------
  /products/bind-courses:
    post:
      summary: 綁定課程到商品
      operationId: bindCoursesToProduct
      tags: [Products]
      description: |
        將一或多個課程綁定到指定的 WooCommerce 商品，設定各課程的存取期限規則。

        **前置（狀態）:**
        - `product_id` 對應的商品必須存在
        - `bind_courses_data` 中每個 `course_id` 對應的課程必須存在且 `_is_course = 'yes'`

        **前置（參數）:**
        - `product_id` 不可為空
        - `bind_courses_data` 不可為空陣列
        - 每項 `limit_type` 為 `fixed` 時，`limit_value` 與 `limit_unit` 不可為空
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - product_id
                - bind_courses_data
              properties:
                product_id:
                  type: integer
                  description: WooCommerce 商品 ID（必填）
                  example: 500
                bind_courses_data:
                  type: array
                  minItems: 1
                  description: 課程綁定設定陣列（每項含課程 ID 及期限規則）
                  items:
                    $ref: '#/components/schemas/BindCourseData'
                  example:
                    - course_id: 100
                      limit_type: unlimited
                    - course_id: 101
                      limit_type: fixed
                      limit_value: 365
                      limit_unit: day
      responses:
        "200":
          description: 課程綁定成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  product_id:
                    type: integer
                  bind_courses_data:
                    type: array
                    items:
                      $ref: '#/components/schemas/BindCourseData'
        "400":
          $ref: '#/components/responses/400ValidationError'
        "403":
          $ref: '#/components/responses/403PreconditionFailed'

  # ----------------------------------------------------------
  # /users/upload-students
  # ----------------------------------------------------------
  /users/upload-students:
    post:
      summary: 批量匯入學員（CSV）
      operationId: uploadStudentsCSV
      tags: [Students]
      description: |
        批量上傳 CSV 名單，將學員加入指定課程。
        使用 Action Scheduler（`pc_batch_add_students_task`）背景執行，避免逾時。

        **前置（狀態）:** `course_id` 對應的課程必須存在

        **前置（參數）:**
        - CSV 必須包含 `email` 欄位
        - 每列 email 格式必須合法（不合法的跳過並記錄錯誤）
        - `expire_date` 若有提供必須為 0 或 10位 Unix timestamp

        **CSV 格式範例:**
        ```
        email,expire_date
        student@example.com,0
        another@example.com,1893456000
        ```
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - course_id
              properties:
                file:
                  type: string
                  format: binary
                  description: CSV 檔案（需含 email 欄位；expire_date 欄位可選）
                course_id:
                  type: integer
                  description: 目標課程 ID（必填）
                  example: 100
      responses:
        "200":
          description: 匯入完成（可能含部分失敗），回傳統計摘要
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadStudentsResult'
        "400":
          $ref: '#/components/responses/400ValidationError'
        "403":
          $ref: '#/components/responses/403PreconditionFailed'

  # ----------------------------------------------------------
  # /students
  # ----------------------------------------------------------
  /students:
    get:
      summary: 查詢學員列表
      operationId: listStudents
      tags: [Students]
      description: |
        查詢已加入特定課程的學員列表（或全站學員）。
        使用 `meta_value` 參數（課程 ID）篩選特定課程的學員。

        **前置（狀態）:** 無

        **前置（參數）:**
        - `search_field` 只允許 email、name、id、default
        - `posts_per_page` 預設 20；`paged` 預設 1
      parameters:
        - name: meta_value
          in: query
          description: |
            課程 ID，查詢特定課程的學員（avl_course_ids meta）。
            前綴 `!` 代表反向查詢（不在此課程的學員）。
          schema:
            type: string
          example: "100"
        - name: search
          in: query
          description: 搜尋關鍵字
          schema:
            type: string
        - name: search_field
          in: query
          description: 搜尋欄位
          schema:
            type: string
            enum: [email, name, id, default]
            default: default
        - name: posts_per_page
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
        - name: paged
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: order
          in: query
          schema:
            type: string
            enum: [ASC, DESC]
            default: DESC
      responses:
        "200":
          description: 學員列表（含分頁資訊）
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/StudentEnrollment'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        "400":
          $ref: '#/components/responses/400ValidationError'

  # ----------------------------------------------------------
  # /students/export/{course_id}
  # ----------------------------------------------------------
  /students/export/{course_id}:
    get:
      summary: 匯出學員 CSV
      operationId: exportStudentsCSV
      tags: [Students]
      description: |
        匯出特定課程所有學員名單為 CSV 檔案。

        **前置（狀態）:** `course_id` 對應的課程必須存在

        **前置（參數）:** `course_id` 不可為空

        **回應格式:** `text/csv`，第一列為欄位標頭
      parameters:
        - name: course_id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
          description: 課程 ID
      responses:
        "200":
          description: CSV 檔案下載
          headers:
            Content-Disposition:
              description: CSV 下載檔名
              schema:
                type: string
                example: 'attachment; filename="students-course-100.csv"'
          content:
            text/csv:
              schema:
                type: string
                description: |
                  CSV 格式，包含欄位：
                  email, display_name, expire_date, course_granted_at, finished_at, course_progress
              example: |
                email,display_name,expire_date,course_granted_at,finished_at,course_progress
                alice@test.com,Alice,永久,2024-01-15 10:00:00,2024-02-20 16:00:00,100
                bob@test.com,Bob,2030-01-01 00:00:00,2024-02-01 09:00:00,,45.5
        "400":
          $ref: '#/components/responses/400ValidationError'
        "403":
          $ref: '#/components/responses/403PreconditionFailed'

  # ----------------------------------------------------------
  # /reports/revenue
  # ----------------------------------------------------------
  /reports/revenue:
    get:
      summary: 查詢營收報表
      operationId: getRevenue
      tags: [Reports]
      description: |
        查詢平台的營收統計報表，支援時間範圍、課程篩選與時間粒度設定。

        **前置（狀態）:** 無

        **前置（參數）:**
        - `start_date` / `end_date` 若有設定必須符合 ISO 8601 格式（e.g. 2024-03-01）
        - `view_type` 只允許 day、week、month
      parameters:
        - name: start_date
          in: query
          description: 查詢起始日期（ISO 8601 格式）
          schema:
            type: string
            format: date
          example: "2024-03-01"
        - name: end_date
          in: query
          description: 查詢結束日期（ISO 8601 格式）
          schema:
            type: string
            format: date
          example: "2024-03-31"
        - name: course_id
          in: query
          description: 篩選特定課程的營收
          schema:
            type: integer
        - name: view_type
          in: query
          description: 時間粒度
          schema:
            type: string
            enum: [day, week, month]
            default: month
      responses:
        "200":
          description: 營收報表資料
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_revenue:
                    type: number
                    format: float
                    description: 總營收
                    example: 7600.00
                  total_orders:
                    type: integer
                    description: 訂單總數
                    example: 5
                  revenue_by_course:
                    type: array
                    description: 各課程分項營收
                    items:
                      type: object
                      properties:
                        course_id:
                          type: integer
                        name:
                          type: string
                        revenue:
                          type: number
                          format: float
                        orders:
                          type: integer
                  revenue_by_period:
                    type: array
                    description: 時間軸分組資料（依 view_type 粒度）
                    items:
                      type: object
                      properties:
                        period:
                          type: string
                          description: 時間標籤（e.g. 2024-03）
                          example: "2024-03"
                        revenue:
                          type: number
                          format: float
                        orders:
                          type: integer
        "400":
          $ref: '#/components/responses/400ValidationError'
