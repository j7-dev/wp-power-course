      operationId: updateBoundCourses
      tags: [Products]
      description: |
        對 `product_ids` 中每個商品，將 `course_ids` 各課程的 `BindCourseData.limit` 更新為新的 `limit_type / limit_value / limit_unit`。
        不改變綁定關係本身，僅修改期限設定。

        **前置（參數）:**
        - `product_ids`、`course_ids`、`limit_type` 皆為必填
        - 當 `limit_type=fixed` 時，`limit_value` 與 `limit_unit` 不可為空
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - product_ids
                - course_ids
                - limit_type
              properties:
                product_ids:
                  type: array
                  items:
                    type: integer
                course_ids:
                  type: array
                  items:
                    type: integer
                limit_type:
                  type: string
                  enum: [unlimited, fixed, assigned, follow_subscription]
                limit_value:
                  type: integer
                  nullable: true
                limit_unit:
                  type: string
                  enum: [day, month, year, timestamp]
                  nullable: true
      responses:
        "200":
          description: 更新成功
        "400":
          $ref: '#/components/responses/400ValidationError'

