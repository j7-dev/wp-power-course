  # 批次設定 / 移除 is_teacher user_meta
  # ----------------------------------------------------------
  /users/add-teachers:
    post:
      summary: 批次設定用戶為講師
      operationId: addTeachers
      tags: [Teachers]
      description: |
        批次將 `user_ids` 的 `is_teacher` user_meta 設為 `yes`。

        **前置（參數）:** `user_ids` 為必填
        **後置（狀態）:** 每個 user 都有 `is_teacher = yes`
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - user_ids
              properties:
                user_ids:
                  type: array
                  items:
                    type: integer
      responses:
        "200":
          description: 批次設定成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: update_users_to_teachers_success
                  message:
                    type: string

  /users/remove-teachers:
    post:
      summary: 批次移除講師身分
      operationId: removeTeachers
      tags: [Teachers]
      description: |
        批次刪除 `user_ids` 的 `is_teacher` user_meta。

        **注意：** 實作採 early-break（單筆失敗就中斷），因此部分成功的情況會回報失敗。
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - user_ids
              properties:
                user_ids:
                  type: array
                  items:
                    type: integer
      responses:
        "200":
          description: 批次移除成功
        "400":
          description: 批次移除失敗（任一用戶移除失敗即全部回報失敗）

  # ----------------------------------------------------------
  # /users/upload-students  (POST)
  # CSV 批次匯入學員（既有 /students/import 的實際後端 endpoint）
  # ----------------------------------------------------------
  /users/upload-students:
    post:
      summary: CSV 批次匯入學員
      operationId: uploadStudentsCsv
      tags: [Students]
      description: |
        上傳 CSV 檔案，以 Action Scheduler 非同步批次處理（每批 50 筆）。
        CSV 欄位：`email, course_id, expire_date`（第三欄可選）。

        流程：
        1. 上傳 CSV 到媒體庫，取得 attachment_id
        2. 建立 email content 日誌檔
        3. enqueue async action `pc_batch_add_students_task`，每批 50 筆
        4. 每批次：逐筆檢查 email → 用戶不存在則建立 → 觸發 `retrieve_password` 發送設定密碼信 → 呼叫 AddStudent
        5. 若 `expire_date` 非 `subscription_*`、非 `numeric`，則透過 `WP::wp_strtotime` 解析
        6. 最後一批完成後，寄信給 `admin_email` 附結果下載連結

        **後置（狀態）:**
        - 每筆 CSV row 觸發 `power_course_add_student_to_course` action
        - 學員活動日誌（StudentLog）寫入 `course_granted` 紀錄
        - 若有對應 email 模板，自動排程發送
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - files
              properties:
                files:
                  type: string
                  format: binary
                  description: CSV 檔案
      responses:
        "200":
          description: 已排程匯入
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: upload_students_success
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      action_id:
                        type: integer
                      url:
                        type: string
                        description: Action Scheduler 後台 URL
        "400":
          $ref: '#/components/responses/400ValidationError'

