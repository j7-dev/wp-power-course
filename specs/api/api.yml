                  code:
                    type: string
                    example: success
                  message:
                    type: string
                    example: 解除綁定成功
                  data:
                    type: object
                    properties:
                      success_ids:
                        type: array
                        items:
                          type: integer
                      failed_ids:
                        type: array
                        items:
                          type: integer
                      course_ids:
                        type: array
                        items:
                          type: integer

