openapi: 3.0.3

info:
  title: Power Course REST API
  description: |
    WordPress LMS Plugin — 整合 WooCommerce 銷售課程、管理章節、追蹤學員進度、自動化 Email 通知。

    ## 錯誤碼對應規則
    - **400** = 前置（參數）Rules 驗證失敗（型別/格式/必填）
    - **403** = 前置（狀態）Rules 不符（資源不存在、權限不足、到期等）
    - **404** = 資源找不到

    ## 認證
    所有管理端 API 需要 WordPress 登入 Cookie 加上 `X-WP-Nonce` Header。
    學員 API（進度查詢、切換章節）需要登入學員身份。

    ## 事件驅動（非 REST 端點）
    以下功能透過 WooCommerce / WordPress Hooks 觸發，不提供直接 REST 端點：
    - **訂單自動開通課程**：WooCommerce 訂單狀態變更時（依 `course_access_trigger` 設定），自動將學員加入綁定課程
    - **排程開課通知**：Action Scheduler 定時檢查 `course_schedule`，到達時觸發 `power_course_course_launch`
    - **觸發自動郵件**：監聽 `power_course_after_add_student_to_course` 等 action，自動發送對應 `pe_email` 模板
    - **自動授權課程**：新用戶註冊時（`user_register` hook），自動授予 `auto_grant_course_ids` 中的課程
  version: "0.12.0"
  contact:
    name: Power Course

servers:
  - url: /wp-json/power-course
    description: Power Course REST API
  - url: /wp-json/power-email
    description: Power Email REST API（郵件模板管理）

security:
  - wpNonce: []

tags:
  - name: Courses
    description: 課程管理
  - name: Chapters
    description: 章節管理
  - name: Students
    description: 學員管理
  - name: StudentLogs
    description: 學員活動紀錄
  - name: Progress
    description: 學習進度（含 toggle-finish-chapters 自動/手動完成章節）
  - name: Products
    description: 商品管理、綁定 / 解綁課程、更新綁定期限
  - name: Bundles
    description: 銷售方案管理
  - name: Settings
    description: 外掛設定（含自動授權課程，/options 為 deprecated 別名）
  - name: Email
    description: 郵件模板管理與手動發送（base path /wp-json/power-email）
  - name: Teachers
    description: 講師管理（設定 / 移除講師身分、指派課程）
  - name: Reports
    description: 營收報表（含 Power Course 擴展欄位 student_count、finished_chapters_count）
  - name: Comments
    description: 章節留言
  - name: Media
    description: 媒體上傳、Bunny Stream 整合、短代碼渲染
  - name: Subtitles
    description: 字幕管理（支援 chapter_video / feature_video / trial_video 三種 video slot）
  - name: Announcements
    description: 課程公告管理（Issue #6）— CRUD + 公開列表查詢

# ============================================================
# COMPONENTS
# ============================================================
components:
  securitySchemes:
    wpNonce:
      type: apiKey
      in: header
      name: X-WP-Nonce
      description: WordPress REST API Nonce

  # ---------- Reusable Headers ----------
  headers:
    X-WP-Total:
      description: 資源總筆數
      schema:
        type: integer
        example: 42
    X-WP-TotalPages:
      description: 總頁數
      schema:
        type: integer
        example: 5

  # ---------- Reusable Schemas ----------
  schemas:

    VideoObject:
      type: object
      description: 影片資料物件
      required:
        - type
      properties:
        type:
          type: string
          enum: [bunny, youtube, vimeo, code, none]
          description: 影片來源類型
        id:
          type: string
          nullable: true
          description: 影片 ID 或 URL（type 為 none 時可為 null）
        meta:
          type: object
          nullable: true
          additionalProperties: true
          description: 額外影片 metadata（依 type 而異）

    BindCourseData:
      type: object
      description: 商品綁定課程的期限設定
      required:
        - course_id
        - limit_type
      properties:
        course_id:
          type: integer
          description: 課程 ID（必須 _is_course = yes）
        limit_type:
          type: string
          enum: [unlimited, fixed, assigned, follow_subscription]
        limit_value:
          type: integer
          nullable: true
          description: 期限數值（limit_type 為 fixed 時必填）
        limit_unit:
          type: string
          enum: [day, month, year, timestamp]
          nullable: true
          description: 期限單位（limit_type 為 fixed 時必填）

    CourseBase:
      type: object
      description: 課程基本欄位（列表用）
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [simple, subscription, external]
          description: |
            產品類型：
            - simple: 站內課程（WC Simple Product）
            - subscription: 站內訂閱課程（WC Subscription Product）
            - external: 外部課程（WC External Product，不可購買）
        status:
          type: string
          enum: [publish, draft]
        price:
          type: string
          description: 售價（WooCommerce 格式字串）；外部課程為展示用
          example: "1200"
        regular_price:
          type: string
          description: 原價；外部課程為展示用
          example: "1500"
        product_url:
          type: string
          nullable: true
          description: 外部課程連結 URL（僅 type=external 時有值），必須為 http/https 開頭
          example: "https://hahow.in/courses/12345"
        button_text:
          type: string
          nullable: true
          description: 外部課程 CTA 按鈕文字（僅 type=external 時有值），預設「前往課程」
          example: "前往 Hahow 上課"
        limit_type:
          type: string
          enum: [unlimited, fixed, assigned, follow_subscription]
          description: 觀看期限類型（僅 type=simple|subscription 時適用）
        limit_value:
          type: integer
          nullable: true
        limit_unit:
          type: string
          enum: [day, month, year, timestamp]
          nullable: true
        course_schedule:
          type: integer
          nullable: true
          description: 開課時間 Unix timestamp（null = 未設定 / 立即開課，僅 type=simple|subscription）
          example: 0
        sale_price:
          type: string
          description: 促銷價；DB meta 為空時回空字串（對齊 WC_Product::get_sale_price）
          example: "888"
        date_on_sale_from:
          type: integer
          nullable: true
          description: 促銷起始時間 Unix timestamp；DB meta 為空時回 null（不回 0，避免前端 RangePicker 解讀為 1970-01-01）
          example: 1735689600
        date_on_sale_to:
          type: integer
          nullable: true
          description: 促銷結束時間 Unix timestamp；DB meta 為空時回 null
          example: 1767225599
        sale_date_range:
          type: array
          nullable: true
          description: 促銷區間 `[from, to]`；任一側為空時整個陣列回 null
          items:
            type: integer
          example: [1735689600, 1767225599]
        on_sale:
          type: boolean
          description: 是否正在促銷中（依 WC_Product::is_on_sale）
        teacher_ids:
          type: array
          items:
            type: integer
          description: 講師 user ID 列表
        is_popular:
          type: string
          enum: [yes, no]
        is_featured:
          type: string
          enum: [yes, no]
        is_free:
          type: string
          enum: [yes, no]
        total_students:
          type: integer
          description: 選課人數（外部課程固定為 0）
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CourseDetail:
      allOf:
        - $ref: '#/components/schemas/CourseBase'
        - type: object
          description: 課程完整詳情（含章節與銷售方案）
          properties:
            _is_course:
              type: string
              enum: [yes]
            description:
              type: string
            short_description:
              type: string
            feature_video:
              $ref: '#/components/schemas/VideoObject'
            trial_video:
              $ref: '#/components/schemas/VideoObject'
            editor:
              type: string
              enum: [power-editor, elementor]
              nullable: true
            chapters:
              type: array
              description: 巢狀章節樹（按 menu_order ASC 排序）
              items:
                $ref: '#/components/schemas/ChapterNode'
            bundle_products:
              type: array
              description: 關聯的銷售方案列表
              items:
                $ref: '#/components/schemas/BundleProductSummary'

    ChapterBase:
      type: object
      description: 章節基本欄位
      properties:
        id:
          type: integer
        post_title:
          type: string
          description: 章節名稱
        post_parent:
          type: integer
          description: 父章節 ID（頂層時為課程商品 ID）
        parent_course_id:
          type: integer
          description: 根課程 ID（任意巢狀深度皆有效）
        chapter_video:
          $ref: '#/components/schemas/VideoObject'
        chapter_length:
          type: integer
          description: 影片長度（秒）
          example: 3600
        enable_comment:
          type: string
          enum: [yes, no]
        menu_order:
          type: integer
          description: 顯示排序（ASC）

    ChapterNode:
      allOf:
        - $ref: '#/components/schemas/ChapterBase'
        - type: object
          properties:
            children:
              type: array
              description: 子章節列表（遞迴結構）
              items:
                $ref: '#/components/schemas/ChapterNode'

    AnnouncementBase:
      type: object
      description: 課程公告基本欄位（Issue #6）
      properties:
        id:
          type: integer
          description: 公告 ID（wp_posts.ID）
          example: 300
        post_title:
          type: string
          description: 公告標題
          example: "雙十一限時五折優惠！"
        post_content:
          type: string
          description: 公告內容（Power Editor 富文本 HTML）
          example: "<p>使用折扣碼 SAVE50</p>"
        post_status:
          type: string
          enum: [publish, future, trash]
          description: 文章狀態 — publish 已發佈 / future 排程中 / trash 已軟刪除
          example: "publish"
        post_parent:
          type: integer
          description: 所屬課程的商品 ID
          example: 100
        parent_course_id:
          type: integer
          description: 根課程 ID（與 post_parent 一致，便於 meta_query）
          example: 100
        post_date:
          type: string
          format: date-time
          description: 發佈起始時間（站台時區，ISO 8601）
          example: "2026-11-01T00:00:00+08:00"
        end_at:
          type: integer
          nullable: true
          description: 發佈結束時間（10 位 Unix timestamp）；null 或空字串代表永久顯示
          example: 1762876800
        visibility:
          type: string
          enum: [public, enrolled]
          description: 可見性 — public 所有訪客 / enrolled 僅已購學員
          example: "public"
        status_label:
          type: string
          enum: [active, scheduled, expired]
          description: |
            計算欄位（read-only），由後端依當下時間判斷：
            - active：post_status=publish 且未過 end_at（或無 end_at）
            - scheduled：post_status=future
            - expired：post_status=publish 但已過 end_at
          example: "active"
        author_id:
          type: integer
          description: 建立者 user_id
          example: 1
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    BundleProductSummary:
      type: object
      description: 銷售方案摘要
      properties:
        id:
          type: integer
        name:
          type: string
        bundle_type:
          type: string
        link_course_ids:
          type: integer
        price:
          type: string
        regular_price:
          type: string
        pbp_product_ids:
          type: array
          description: 方案包含的商品 ID 列表
          items:
            type: integer
        pbp_product_quantities:
          type: object
          description: '各商品數量 {product_id: qty}'
          additionalProperties:
            type: integer

    BundleProduct:
      type: object
      description: 銷售方案完整資料
      properties:
        id:
          type: integer
        name:
          type: string
        status:
          type: string
          enum: [publish, draft]
        bundle_type:
          type: string
          description: 方案類型（e.g. single_course, annual_course）
        link_course_ids:
          type: integer
          description: 綁定的課程 ID
        price:
          type: string
          example: "399"
        regular_price:
          type: string
          example: "599"
        pbp_product_ids:
          type: array
          description: |
            方案包含的商品 ID 列表。
            向下相容：若舊方案 exclude_main_course ≠ "yes"，
            且 link_course_id 不在列表中，runtime 自動補入。
          items:
            type: integer
          example: [100, 200]
        pbp_product_quantities:
          type: object
          description: |
            方案中每個商品的數量，以 JSON 物件 {"product_id": qty} 儲存。
            缺少此欄位時所有商品 fallback 數量為 1。
            qty 範圍：1~999，0 或空值自動修正為 1。
          additionalProperties:
            type: integer
            minimum: 1
            maximum: 999
          example:
            "100": 2
            "200": 3
        bind_courses_data:
          type: array
          items:
            $ref: '#/components/schemas/BindCourseData'

    StudentEnrollment:
      type: object
      description: 學員選課資料
      properties:
        user_id:
          type: integer
        display_name:
          type: string
        formatted_name:
          type: string
          description: |
            格式化名稱，遵循 Fallback Chain：
            ① billing_last_name + billing_first_name
            ② last_name + first_name
            ③ display_name
        email:
          type: string
          format: email
        expire_date:
          description: |
            到期時間：
            - `0` = 永久存取
            - 10位 Unix timestamp = 指定到期時間
            - `"subscription_123"` = 跟隨訂閱
          oneOf:
            - type: integer
              description: 0 = 永久；10位 Unix timestamp
              example: 0
            - type: string
              pattern: '^subscription_\d+$'
              example: subscription_123
        course_granted_at:
          type: string
          format: date-time
          nullable: true
          description: 課程開通時間
        finished_at:
          type: string
          format: date-time
          nullable: true
          description: 課程完成時間（進度達 100% 時設定）
        course_progress:
          type: number
          format: float
          description: 進度百分比（0–100）
          example: 66.67

    StudentLog:
      type: object
      description: 學員活動紀錄
      properties:
        id:
          type: integer
        user_id:
          type: integer
        course_id:
          type: integer
        chapter_id:
          type: integer
          nullable: true
          description: 章節 ID（課程級別事件為 null）
        log_type:
          type: string
          enum: [course_granted, course_finish, course_launch, chapter_enter, chapter_finish]
        title:
          type: string
        content:
          type: string
          nullable: true
        user_ip:
          type: string
          example: "192.168.1.1"
        created_at:
          type: string
          format: date-time

    Pagination:
      type: object
      properties:
        total:
          type: integer
          description: 總筆數
        total_pages:
          type: integer
          description: 總頁數

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          description: 錯誤代碼
          example: rest_invalid_param
        message:
          type: string
          description: 錯誤訊息（可能為繁中）
          example: "user_ids 不可為空陣列"
        data:
          type: object
          nullable: true
          properties:
            status:
              type: integer
              description: HTTP 狀態碼
              example: 400

    Settings:
      type: object
      description: Power Course 外掛設定
      properties:
        course_access_trigger:
          type: string
          description: 觸發課程開通的 WooCommerce 訂單狀態（e.g. completed, processing）
          example: completed
        course_permalink_structure:
          type: string
          description: 課程固定連結結構
          example: ""
        hide_myaccount_courses:
          type: string
          enum: [yes, no]
        fix_video_and_tabs_mobile:
          type: string
          enum: [yes, no]
        pc_header_offset:
          type: string
          description: 固定頂欄高度偏移 px
          example: "0"
        hide_courses_in_main_query:
          type: string
          enum: [yes, no]
        hide_courses_in_search_result:
          type: string
          enum: [yes, no]
        pc_watermark_qty:
          type: integer
          minimum: 0
          description: 影片浮水印數量（0 = 關閉）
        pc_watermark_text:
          type: string
          description: 浮水印文字模板（支援 {display_name}, {post_title}, {ip}, {email}）
          example: "{display_name} {post_title} IP:{ip}"
        pc_pdf_watermark_qty:
          type: integer
          minimum: 0
        pc_pdf_watermark_text:
          type: string
        auto_grant_course_ids:
          type: array
          description: 新用戶註冊時自動授權的課程 ID 列表（空陣列 = 不自動授權）
          items:
            type: integer
          example: [100, 101]

    UploadStudentsResult:
      type: object
      description: 批量匯入學員結果摘要
      properties:
        success_count:
          type: integer
          description: 成功匯入筆數
        error_count:
          type: integer
          description: 失敗筆數
        errors:
          type: array
          description: 失敗明細
          items:
            type: object
            properties:
              row:
                type: integer
                description: CSV 行號
              email:
                type: string
              reason:
                type: string
        action_scheduler_id:
          type: integer
          nullable: true
          description: Action Scheduler 背景任務 ID（大量匯入時回傳）

    EmailTemplate:
      type: object
      description: 郵件模板資料（post_type = pe_email）
      properties:
        id:
          type: integer
        post_title:
          type: string
          description: 郵件主旨
        post_content:
          type: string
          description: 郵件內容（MJML 模板）
        post_status:
          type: string
          enum: [publish, draft]
        trigger_at:
          type: string
          enum: [course_granted, course_finish, course_launch, chapter_enter, chapter_finish]
          description: 觸發類型
        course_id:
          type: integer
          nullable: true
          description: 綁定的課程 ID（null = 全域模板）
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Comment:
      type: object
      description: 章節留言
      properties:
        comment_ID:
          type: integer
        comment_post_ID:
          type: integer
          description: 章節 ID
        comment_author:
          type: string
        comment_content:
          type: string
        comment_approved:
          type: string
          enum: ["0", "1"]
          description: 審核狀態（0 = 待審、1 = 已核准）
        comment_date:
          type: string
          format: date-time
        user_id:
          type: integer

    UploadResult:
      type: object
      description: 媒體上傳結果
      properties:
        attachment_id:
          type: integer
          nullable: true
          description: WordPress 附件 ID（upload_only 模式時為 null）
        url:
          type: string
          description: 媒體檔案 URL 或路徑

    SubtitleTrack:
      type: object
      description: 字幕軌道物件
      required:
        - srclang
        - label
        - url
        - attachment_id
      properties:
        srclang:
          type: string
          description: BCP-47 語言代碼
          example: "zh-TW"
        label:
          type: string
          description: 語言顯示名稱
          example: "繁體中文"
        url:
          type: string
          description: WebVTT 檔案 URL
          example: "https://example.com/wp-content/uploads/subtitle-zh-tw.vtt"
        attachment_id:
          type: integer
          description: WordPress 媒體庫附件 ID
          example: 301

    VideoSlot:
      type: string
      description: |
        影片 slot 類型，決定字幕儲存到哪個 postmeta，也決定允許的 post type：

        | videoSlot | 允許的 post type | 說明 |
        |-----------|-----------------|------|
        | chapter_video | pc_chapter | 章節主要影片 |
        | feature_video | product    | 課程商品的特色影片（銷售頁展示） |
        | trial_video   | product    | 課程商品的試看影片 |

        字幕儲存於 postmeta key：`pc_subtitles_{videoSlot}`
      enum:
        - chapter_video
        - feature_video
        - trial_video
      example: chapter_video

    AvailableSubtitleLanguage:
      type: object
      description: 系統支援的字幕語言（BCP-47 → 顯示名稱）
      properties:
        srclang:
          type: string
          example: zh-TW
        label:
          type: string
          example: 繁體中文
      x-supported-languages:
        - { srclang: zh-TW, label: 繁體中文 }
        - { srclang: zh-CN, label: 简体中文 }
        - { srclang: en,    label: English }
        - { srclang: ja,    label: 日本語 }
        - { srclang: ko,    label: 한국어 }
        - { srclang: vi,    label: Tiếng Việt }
        - { srclang: th,    label: ไทย }
        - { srclang: id,    label: Bahasa Indonesia }
        - { srclang: ms,    label: Bahasa Melayu }
        - { srclang: fr,    label: Français }
        - { srclang: de,    label: Deutsch }
        - { srclang: es,    label: Español }
        - { srclang: pt,    label: Português }
        - { srclang: ru,    label: Русский }
        - { srclang: ar,    label: العربية }
        - { srclang: hi,    label: हिन्दी }

    EmailScheduledAction:
      type: object
      description: |
        Action Scheduler 排程動作物件（郵件相關，group = `power_email`）。
        對應 `as_get_scheduled_actions()` 回傳結構。
      properties:
        id:
          type: integer
          description: Action ID
        hook:
          type: string
          description: Hook 名稱（如 `power_email_send_users`、`power_email_send_course_granted`）
        status_name:
          type: string
          description: 原始狀態 slug（pending / complete / failed / in-progress / canceled）
        status:
          type: string
          description: 狀態顯示名稱
        args:
          type: array
          description: 呼叫 action 的參數（如 email_ids、user_ids）
          items:
            type: object
        group:
          type: string
          example: power_email
        log_entries:
          type: string
          description: 執行日誌（HTML `<ol>` 格式）
        claim_id:
          type: integer
        recurrence:
          type: string
          description: 週期設定（Non-repeating 或 Every xxx）
        schedule:
          type: string
          description: 排程時間（Y-m-d H:i:s）
          example: "2026-04-20 10:00:00"

    RevenueStats:
      type: object
      description: |
        營收統計資料（擴展自 WooCommerce Analytics Revenue Report）。
        intervals 陣列長度取決於 `interval`（day / week / month / quarter / year）與日期範圍。
      properties:
        totals:
          type: object
          properties:
            net_revenue: { type: number, format: float }
            avg_order_value: { type: number, format: float }
            orders_count: { type: integer }
            avg_items_per_order: { type: number, format: float }
            num_items_sold: { type: integer }
            coupons: { type: number, format: float }
            coupons_count: { type: integer }
            total_customers: { type: integer }
            total_sales: { type: number, format: float }
            refunds: { type: number, format: float }
            shipping: { type: number, format: float }
            gross_sales: { type: number, format: float }
            refunded_orders_count: { type: integer, description: "退款訂單數（Power Course 擴展欄位）" }
            non_refunded_orders_count: { type: integer, description: "非退款訂單數（Power Course 擴展欄位）" }
            student_count: { type: integer, description: "新增學員數（Power Course 擴展欄位）— 由 pc_avl_coursemeta 中 course_granted_at 計算" }
            finished_chapters_count: { type: integer, description: "完成章節數（Power Course 擴展欄位）— 由 pc_avl_chaptermeta 中 finished_at 計算" }
        intervals:
          type: array
          items:
            type: object
            properties:
              interval:
                type: string
                example: "2026-04-13"
              date_start:
                type: string
              date_end:
                type: string
              subtotals:
                type: object
                description: 與 totals 相同結構，含 student_count 與 finished_chapters_count 擴展欄位

    ProductSelectOption:
      type: object
      description: 商品下拉選項（樹狀選擇用）
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [simple, subscription, external, variable, variation, bundle]
        is_course:
          type: boolean
          description: 是否為課程商品（`_is_course = yes`）
        link_course_id:
          type: integer
          nullable: true
          description: 若為銷售方案，指向所屬課程 ID

    ProductOptions:
      type: object
      description: 商品管理頁所需的 lookup options
      properties:
        product_types:
          type: array
          items:
            type: object
            properties:
              value: { type: string }
              label: { type: string }
        product_statuses:
          type: array
          items:
            type: object
            properties:
              value: { type: string }
              label: { type: string }
        product_cats:
          type: array
          items:
            type: object
        product_tags:
          type: array
          items:
            type: object

    BunnyVideo:
      type: object
      description: |
        Bunny Stream 影片物件（由 `antd-toolkit/refine` 的 `MediaLibrary` 元件提供）。
        實際 API 由 Powerhouse 或 Bunny Stream SDK 提供，並非 Power Course 自有 REST 端點。
        此 schema 僅作為規格文件記錄。
      properties:
        guid:
          type: string
          description: Bunny 影片 GUID（作為播放時的 video_id）
        title:
          type: string
        dateUploaded:
          type: string
          format: date-time
        views:
          type: integer
        isPublic:
          type: boolean
        length:
          type: integer
          description: 影片長度（秒）
        status:
          type: integer
          description: 0=Created, 1=Uploaded, 2=Processing, 3=Transcoding, 4=Finished, 5=Error
        thumbnailFileName:
          type: string
        storageSize:
          type: integer
        captions:
          type: array
          items:
            type: object
        width:
          type: integer
        height:
          type: integer

  # ---------- Reusable Responses ----------
  responses:
    400ValidationError:
      description: |
        請求參數驗證失敗（前置參數 Rules）。
        常見原因：必填欄位為空、格式不合法、enum 值不在允許清單中。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            emptyArray:
              summary: 陣列為空
              value:
                code: rest_invalid_param
                message: "user_ids 不可為空陣列"
                data:
                  status: 400
            invalidFormat:
              summary: 格式不合法
              value:
                code: rest_invalid_param
                message: "expire_date 必須是 10 位正整數或 subscription_{id} 格式"
                data:
                  status: 400
            missingRequired:
              summary: 必填欄位缺失
              value:
                code: rest_invalid_param
                message: "name 為必填欄位"
                data:
                  status: 400
            invalidLimitValue:
              summary: limit_value 為空
              value:
                code: rest_invalid_param
                message: "limit_type 為 fixed 時 limit_value 不可為空"
                data:
                  status: 400
            invalidLimitUnit:
              summary: limit_unit 為空
              value:
                code: rest_invalid_param
                message: "limit_type 為 fixed 時 limit_unit 不可為空"
                data:
                  status: 400
            negativePrice:
              summary: 負數價格
              value:
                code: rest_invalid_param
                message: "price 須為非負數"
                data:
                  status: 400
            invalidTimestamp:
              summary: 到期日格式錯誤
              value:
                code: rest_invalid_param
                message: "expire_date 必須為整數"
                data:
                  status: 400
            missingEmail:
              summary: CSV 缺少 email 欄位
              value:
                code: rest_invalid_param
                message: "CSV 必須包含 email 欄位"
                data:
                  status: 400
            emptyFile:
              summary: 未提供檔案
              value:
                code: rest_invalid_param
                message: "必須提供檔案"
                data:
                  status: 400
            emptyContent:
              summary: 留言內容為空
              value:
                code: rest_invalid_param
                message: "留言內容不可為空"
                data:
                  status: 400
            invalidTriggerAt:
              summary: 非法觸發類型
              value:
                code: rest_invalid_param
                message: "trigger_at 必須為合法的觸發類型"
                data:
                  status: 400
            invalidAccessTrigger:
              summary: 無效的訂單狀態
              value:
                code: rest_invalid_param
                message: "course_access_trigger 必須為有效的 WooCommerce 訂單狀態"
                data:
                  status: 400
            negativeWatermark:
              summary: 負數浮水印數量
              value:
                code: rest_invalid_param
                message: "pc_watermark_qty 必須為非負整數"
                data:
                  status: 400
            missingMetaValue:
              summary: meta_value 未提供
              value:
                code: rest_invalid_param
                message: "meta_value 為必填參數"
                data:
                  status: 400
            missingCourseId:
              summary: course_id 未提供
              value:
                code: rest_invalid_param
                message: "course_id 為必填參數"
                data:
                  status: 400
            missingStartDate:
              summary: start_date 未提供
              value:
                code: rest_invalid_param
                message: "必要參數未提供"
                data:
                  status: 400

    403PreconditionFailed:
      description: |
        前置狀態條件不符（前置狀態 Rules）。
        常見原因：學員無存取權、課程已到期、資源不存在、未登入。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            noAccess:
              summary: 無課程存取權
              value:
                code: rest_forbidden
                message: "無此課程存取權"
                data:
                  status: 403
            expired:
              summary: 課程已到期
              value:
                code: rest_forbidden
                message: "課程存取已到期"
                data:
                  status: 403
            notLoggedIn:
              summary: 未登入
              value:
                code: rest_forbidden
                message: "必須登入"
                data:
                  status: 403
            commentDisabled:
              summary: 留言未啟用
              value:
                code: rest_forbidden
                message: "此章節未啟用留言功能"
                data:
                  status: 403
            studentNoAccess:
              summary: 學員無此課程存取權
              value:
                code: rest_forbidden
                message: "學員無此課程存取權"
                data:
                  status: 403
            userNotFound:
              summary: 用戶不存在
              value:
                code: rest_forbidden
                message: "用戶不存在"
                data:
                  status: 403

    404NotFound:
      description: 指定資源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            courseNotFound:
              summary: 課程不存在
              value:
                code: rest_not_found
                message: "課程不存在"
                data:
                  status: 404
            chapterNotFound:
              summary: 章節不存在
              value:
                code: rest_not_found
                message: "章節不存在"
                data:
                  status: 404
            emailNotFound:
              summary: 郵件模板不存在
              value:
                code: rest_not_found
                message: "郵件模板不存在"
                data:
                  status: 404

# ============================================================
# PATHS
# ============================================================
paths:

  # ----------------------------------------------------------
  # /courses  (GET list + POST create + DELETE bulk)
  # ----------------------------------------------------------
  /courses:
    get:
      summary: 查詢課程列表
      operationId: listCourses
      tags: [Courses]
      description: |
        查詢課程列表，支援分頁、排序、狀態篩選、類型篩選與關鍵字搜尋。
        預設回傳所有類型的課程（simple + subscription + external）。

        **前置（參數）:**
        - `posts_per_page` 為負數時使用預設值（回傳全部）

        **後置（回應）:**
        - 回應包含 `X-WP-Total` 和 `X-WP-TotalPages` Headers
        - 無符合條件的課程時回傳空陣列
        - 每筆課程回應中包含 `type` 欄位（simple | subscription | external）
      parameters:
        - name: type
          in: query
          description: 篩選課程產品類型（不傳時回傳所有類型）
          schema:
            type: string
            enum: [simple, subscription, external]
        - name: posts_per_page
          in: query
          description: 每頁筆數（預設 10）
          schema:
            type: integer
            default: 10
            minimum: 1
        - name: paged
          in: query
          description: 頁碼（預設 1）
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: orderby
          in: query
          description: 排序依據欄位
          schema:
            type: string
            enum: [date, title, price, menu_order]
            default: date
        - name: order
          in: query
          description: 排序方向
          schema:
            type: string
            enum: [ASC, DESC]
            default: DESC
        - name: status
          in: query
          description: 篩選課程狀態（預設同時回傳 publish 和 draft）
          style: form
          explode: false
          schema:
            oneOf:
              - type: string
                enum: [publish, draft]
              - type: array
                items:
                  type: string
                  enum: [publish, draft]
        - name: search
          in: query
          description: 課程名稱關鍵字搜尋
          schema:
            type: string
      responses:
        "200":
          description: 課程列表（含分頁 Headers）
          headers:
            X-WP-Total:
              $ref: '#/components/headers/X-WP-Total'
            X-WP-TotalPages:
              $ref: '#/components/headers/X-WP-TotalPages'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CourseBase'
        "400":
          $ref: '#/components/responses/400ValidationError'

    post:
      summary: 建立課程
      operationId: createCourse
      tags: [Courses]
      description: |
        建立新的 WooCommerce 課程商品，設定名稱、售價、存取期限、開課時間、講師等基本資訊。
        支援建立站內課程（simple/subscription）或外部課程（external）。

        **前置（狀態）:** 無

        **前置（參數）:**
        - `name` 不可為空
        - `limit_type` 為 `fixed` 時，`limit_value` 與 `limit_unit` 不可為空（僅 simple/subscription）
        - `limit_type` 為 `assigned` 時，`limit_value` 必須是有效的 10 位 Unix timestamp（僅 simple/subscription）
        - `price` 若有設定須為非負數
        - 若 `is_external` 為 `true`：
          - `product_url` 為必填，且須為合法 http/https URL
          - `button_text` 選填，預設「前往課程」
          - `limit_type`、`limit_value`、`limit_unit` 被忽略

        **後置（狀態）:**
        - 建立 WooCommerce 商品並設 `_is_course` 為 `yes`
        - `is_external` 為 `true` 時，建立 `WC_Product_External`（product_type = external）
        - `is_external` 為 `false` 或未傳時，建立 `WC_Product_Simple`（預設）
        - `teacher_ids` 以多筆 meta rows 分別儲存
        - 回傳新建課程的完整資料（含 ID 與 type）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: 課程名稱（必填）
                  example: PHP 基礎入門
                status:
                  type: string
                  enum: [publish, draft]
                  default: draft
                description:
                  type: string
                short_description:
                  type: string
                price:
                  type: string
                  description: 售價（非負數字串）
                  example: "1200"
                regular_price:
                  type: string
                  example: "1500"
                limit_type:
                  type: string
                  enum: [unlimited, fixed, assigned, follow_subscription]
                  default: unlimited
                limit_value:
                  type: integer
                  nullable: true
                  description: 期限數值（fixed 時必填）
                limit_unit:
                  type: string
                  enum: [day, month, year, timestamp]
                  nullable: true
                  description: 期限單位（fixed 時必填）
                course_schedule:
                  type: integer
                  description: 開課時間 Unix timestamp（0 = 立即開課）
                  default: 0
                teacher_ids:
                  type: array
                  items:
                    type: integer
                  description: 講師 user ID 陣列
                is_popular:
                  type: string
                  enum: [yes, no]
                  default: no
                is_featured:
                  type: string
                  enum: [yes, no]
                  default: no
                is_free:
                  type: string
                  enum: [yes, no]
                  default: no
                feature_video:
                  $ref: '#/components/schemas/VideoObject'
                trial_video:
                  $ref: '#/components/schemas/VideoObject'
                is_external:
                  type: boolean
                  default: false
                  description: |
                    是否為外部課程。為 true 時建立 WC_Product_External（product_type=external），
                    此時 product_url 為必填，limit_type/limit_value/limit_unit/course_schedule 被忽略。
                product_url:
                  type: string
                  description: 外部課程連結 URL（is_external=true 時必填，須為 http/https 開頭）
                  example: "https://hahow.in/courses/12345"
                button_text:
                  type: string
                  description: 外部課程 CTA 按鈕文字（is_external=true 時適用，預設「前往課程」）
                  default: "前往課程"
                  example: "前往 Hahow 上課"
      responses:
        "200":
          description: 課程建立成功，回傳完整課程資料（含新建 ID）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseDetail'
        "400":
          description: 參數驗證失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                emptyName:
                  summary: 名稱為空
                  value:
                    code: rest_invalid_param
                    message: "name 為必填欄位"
                    data:
                      status: 400
                missingLimitValue:
                  summary: limit_value 缺失
                  value:
                    code: rest_invalid_param
                    message: "limit_type 為 fixed 時 limit_value 不可為空"
                    data:
                      status: 400
                missingLimitUnit:
                  summary: limit_unit 缺失
                  value:
                    code: rest_invalid_param
                    message: "limit_type 為 fixed 時 limit_unit 不可為空"
                    data:
                      status: 400
                negativePrice:
                  summary: 負數價格
                  value:
                    code: rest_invalid_param
                    message: "price 須為非負數"
                    data:
                      status: 400
                invalidAssignedTimestamp:
                  summary: assigned limit_value 格式不合法
                  value:
                    code: rest_invalid_param
                    message: "limit_value 必須是有效的 10 位 Unix timestamp"
                    data:
                      status: 400
                missingProductUrl:
                  summary: 外部課程缺少 product_url
                  value:
                    code: rest_invalid_param
                    message: "外部課程的 product_url 為必填欄位"
                    data:
                      status: 400
                invalidProductUrl:
                  summary: product_url 格式不合法
                  value:
                    code: rest_invalid_param
                    message: "product_url 必須為合法的 http/https URL"
                    data:
                      status: 400

    delete:
      summary: 刪除課程（批量）
      operationId: deleteCourses
      tags: [Courses]
      description: |
        刪除一或多個課程商品（wp_delete_post）。關聯章節與學員紀錄不自動刪除。

        **前置（狀態）:** 所有 `ids` 對應的課程必須存在

        **前置（參數）:** `ids` 不可為空陣列
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ids
              properties:
                ids:
                  type: array
                  minItems: 1
                  items:
                    type: integer
                  description: 要刪除的課程 ID 陣列
                  example: [100, 101]
      responses:
        "200":
          description: 刪除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  deleted_ids:
                    type: array
                    items:
                      type: integer
        "400":
          description: 參數驗證失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                emptyIds:
                  summary: ids 為空陣列
                  value:
                    code: rest_invalid_param
                    message: "ids 不可為空陣列"
                    data:
                      status: 400
        "403":
          $ref: '#/components/responses/403PreconditionFailed'

  # ----------------------------------------------------------
  # /courses/{id}  (GET detail + POST update)
  # ----------------------------------------------------------
  /courses/{id}:
    get:
      summary: 取得課程詳情
      operationId: getCourse
      tags: [Courses]
      description: |
        取得單一課程的完整詳情，包含章節結構（巢狀）與銷售方案列表。

        **前置（狀態）:** 指定 id 對應的課程必須存在且 `_is_course = 'yes'`

        **前置（參數）:**
        - `id` 必須為正整數

        **後置（回應）:**
        - 包含完整課程 meta 與章節列表（按 menu_order ASC 排列）
        - 包含銷售方案列表（bundle_products）
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
          description: 課程 ID
      responses:
        "200":
          description: 課程完整詳情（含章節樹與銷售方案）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseDetail'
        "400":
          $ref: '#/components/responses/400ValidationError'
        "403":
          $ref: '#/components/responses/403PreconditionFailed'
        "404":
          $ref: '#/components/responses/404NotFound'

    post:
      summary: 更新課程
      operationId: updateCourse
      tags: [Courses]
      description: |
        更新指定課程的基本資訊、定價、存取設定、媒體等。
        外部課程（type=external）可更新 product_url 與 button_text。

        **前置（狀態）:** 指定 id 對應的課程必須存在且 `_is_course = 'yes'`

        **前置（參數）:**
        - `id` 不可為空且必須為正整數
        - 同 CreateCourse 的參數驗證規則
        - 外部課程的 `product_url` 若有傳入，須為合法 http/https URL，不可為空

        **更新語義合約（Issue #203）:**
        - **欄位未出現在 request body** → 視為「保持原狀」，不觸發 setter。
        - **欄位值為空字串 `""`** → 視為「清空」，後端寫入空字串到 DB meta。
        - **特例**：`button_text` 清空時 fallback 為預設 `"Visit course"`；`slug` 清空時由 WordPress 依 post_title 重新生成。
        - **特例**：`date_on_sale_from` 與 `date_on_sale_to` 僅其中一側為空而另一側有值時，後端強制兩側同步清空。

        **可清空的選填欄位**（前端若清空需顯式送 `""`）:
        `sale_price`、`date_on_sale_from`、`date_on_sale_to`、`short_description`、`slug`、`purchase_note`、`limit_type`、`limit_value`、`limit_unit`、`course_schedule`、`feature_video`、`trial_video`、`button_text`、`sku`

        **後置（狀態）:**
        - 更新 WC_Product 後持久化
        - `teacher_ids` 先 delete_meta_data 再 add_meta_data loop（完全替換）
        - 產品類型（type）不可變更（建立後鎖定）

        **後置觸發:** `power_course_before_update_product_meta` action
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: 所有欄位皆為可選，僅更新有傳入的欄位
              properties:
                name:
                  type: string
                status:
                  type: string
                  enum: [publish, draft]
                description:
                  type: string
                short_description:
                  type: string
                  description: 簡短描述；送 `""` 視為清空
                slug:
                  type: string
                  description: 網址 slug；送 `""` 時由 WP 依 post_title 重新生成
                price:
                  type: string
                regular_price:
                  type: string
                sale_price:
                  type: string
                  description: 促銷價；送 `""` 視為清空（_sale_price meta = ""）
                date_on_sale_from:
                  oneOf:
                    - type: integer
                      description: Unix timestamp（秒）
                    - type: string
                      description: 送 `""` 視為清空
                  description: 促銷起始時間；送 `""` 視為清空；單側清空時另一側也強制清空
                date_on_sale_to:
                  oneOf:
                    - type: integer
                    - type: string
                  description: 促銷結束時間；送 `""` 視為清空；單側清空時另一側也強制清空
                purchase_note:
                  type: string
                  description: 購買備註；送 `""` 視為清空
                sku:
                  type: string
                  description: SKU；送 `""` 視為清空
                limit_type:
                  type: string
                  enum: [unlimited, fixed, assigned, follow_subscription]
                limit_value:
                  oneOf:
                    - type: integer
                    - type: string
                      description: 送 `""` 視為清空
                  nullable: true
                limit_unit:
                  oneOf:
                    - type: string
                      enum: [day, month, year, timestamp]
                    - type: string
                      description: 送 `""` 視為清空
                  nullable: true
                course_schedule:
                  oneOf:
                    - type: integer
                    - type: string
                      description: 送 `""` 視為清空
                teacher_ids:
                  type: array
                  items:
                    type: integer
                is_popular:
                  type: string
                  enum: [yes, no]
                is_featured:
                  type: string
                  enum: [yes, no]
                is_free:
                  type: string
                  enum: [yes, no]
                feature_video:
                  oneOf:
                    - $ref: '#/components/schemas/VideoObject'
                    - type: string
                      description: 送 `""` 視為清空
                trial_video:
                  oneOf:
                    - $ref: '#/components/schemas/VideoObject'
                    - type: string
                      description: 送 `""` 視為清空
                product_url:
                  type: string
                  description: 外部課程連結 URL（僅 type=external 時適用，須為 http/https 開頭，不可為空）
                button_text:
                  type: string
                  description: 外部課程 CTA 按鈕文字（僅 type=external 時適用）；送 `""` 時 fallback 為預設 "Visit course"
      responses:
        "200":
          description: 課程更新成功，回傳完整更新後課程資料
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseDetail'
        "400":
          description: 參數驗證失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingLimitValue:
                  summary: limit_value 缺失
                  value:
                    code: rest_invalid_param
                    message: "limit_type 為 fixed 時 limit_value 不可為空"
                    data:
                      status: 400
        "403":
          $ref: '#/components/responses/403PreconditionFailed'
        "404":
          $ref: '#/components/responses/404NotFound'

  # ----------------------------------------------------------
  # /courses/duplicate/{id}  (POST duplicate)
  # ----------------------------------------------------------
  /courses/duplicate/{id}:
    post:
      summary: 複製課程
      operationId: duplicateCourse
      tags: [Courses]
      description: |
        複製指定課程，包含章節結構、銷售方案與商品綁定。學員資料不複製。

        **前置（狀態）:** 來源課程必須存在

        **前置（參數）:** `id` 不可為空

        **後置（狀態）:**
        - 新課程狀態固定為 `draft`
        - 遞迴複製所有巢狀章節並維持結構與排序
        - 複製銷售方案（`link_course_ids` 指向新課程、`status` 為 `draft`）
        - 學員資料不複製（新課程學員數為 0）
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
          description: 來源課程 ID
      responses:
        "200":
          description: 複製成功，回傳新課程完整資料
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseDetail'
        "400":
          description: 參數驗證失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingId:
                  summary: 未提供課程 ID
                  value:
                    code: rest_invalid_param
                    message: "id 為必填欄位"
                    data:
                      status: 400
        "404":
          description: 來源課程不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                courseNotFound:
                  summary: 課程不存在
                  value:
                    code: rest_not_found
                    message: "課程不存在"
                    data:
                      status: 404

  # ----------------------------------------------------------
  # /courses/{id}/teachers  (PUT assign teachers)
  # ----------------------------------------------------------
  /courses/{id}/teachers:
    put:
      summary: 指派講師到課程
      operationId: assignTeachers
      tags: [Teachers]
      description: |
        指派一或多位講師到指定課程。完全替換現有講師列表（先刪除再新增）。

        **前置（狀態）:**
        - 課程必須存在
        - 所有 `teacher_ids` 中的用戶必須存在

        **前置（參數）:** `teacher_ids` 不可為空

        **後置（狀態）:**
        - 以多筆 `teacher_ids` meta rows 儲存
        - 重新指派時先刪除再新增（完全替換）
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
          description: 課程 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - teacher_ids
              properties:
                teacher_ids:
                  type: array
                  minItems: 1
                  items:
                    type: integer
                  description: 講師 user ID 陣列
                  example: [10, 11]
      responses:
        "200":
          description: 講師指派成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  teacher_ids:
                    type: array
                    items:
                      type: integer
                    example: [10, 11]
        "400":
          description: 參數驗證失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                emptyTeacherIds:
                  summary: teacher_ids 為空
                  value:
                    code: rest_invalid_param
                    message: "teacher_ids 不可為空"
                    data:
                      status: 400
        "403":
          description: 前置狀態不符
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                userNotFound:
                  summary: 用戶不存在
                  value:
                    code: rest_forbidden
                    message: "用戶不存在"
                    data:
                      status: 403
        "404":
          description: 課程不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                courseNotFound:
                  summary: 課程不存在
                  value:
                    code: rest_not_found
                    message: "課程不存在"
                    data:
                      status: 404

  # ----------------------------------------------------------
  # /chapters  (POST create + DELETE bulk)
  # ----------------------------------------------------------
  /chapters:
    post:
      summary: 建立章節
      operationId: createChapter
      tags: [Chapters]
      description: |
        在指定課程下建立新章節（支援巢狀結構）。

        **前置（狀態）:**
        - `parent_course_id` 對應的課程必須存在且 `_is_course = 'yes'`
        - 若 `post_parent` 為章節 ID，該章節必須存在且 `post_type = 'pc_chapter'`

        **前置（參數）:**
        - `post_title` 不可為空
        - `parent_course_id` 不可為空
        - `chapter_video.type` 必須為 bunny / youtube / vimeo / code / none 之一

        **後置（狀態）:** 建立 post_type 為 `pc_chapter` 的文章
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - post_title
                - parent_course_id
              properties:
                post_title:
                  type: string
                  description: 章節名稱（必填）
                  example: "第一章：環境設定"
                post_parent:
                  type: integer
                  description: 父節點 ID（課程 ID 或父章節 ID）
                  example: 100
                parent_course_id:
                  type: integer
                  description: 根課程 ID（必填）
                  example: 100
                chapter_video:
                  $ref: '#/components/schemas/VideoObject'
                chapter_length:
                  type: integer
                  description: 影片長度（秒）
                  default: 0
                  example: 3600
                enable_comment:
                  type: string
                  enum: [yes, no]
                  default: no
                menu_order:
                  type: integer
                  description: 排序順序
                  default: 0
      responses:
        "200":
          description: 章節建立成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChapterBase'
        "400":
          description: 參數驗證失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                emptyTitle:
                  summary: 章節名稱為空
                  value:
                    code: rest_invalid_param
                    message: "post_title 不可為空"
                    data:
                      status: 400
                emptyParentCourseId:
                  summary: 根課程 ID 為空
                  value:
                    code: rest_invalid_param
                    message: "parent_course_id 不可為空"
                    data:
                      status: 400
        "403":
          $ref: '#/components/responses/403PreconditionFailed'

    delete:
      summary: 批次刪除章節
      operationId: deleteChaptersBulk
      tags: [Chapters]
      description: |
        批次刪除多個章節（wp_trash_post）。刪除父章節時連帶刪除所有子章節（cascade）。

        **前置（狀態）:** 所有章節 ID 必須存在

        **前置（參數）:** `ids` 不可為空陣列

        **後置（狀態）:**
        - 章節 post_status 設為 trash
        - 清除相關的 chaptermeta 進度記錄
        - 清除課程章節列表 transient 快取
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ids
              properties:
                ids:
                  type: array
                  minItems: 1
                  items:
                    type: integer
                  description: 要刪除的章節 ID 陣列
                  example: [200, 201]
      responses:
        "200":
          description: 批次刪除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  deleted_ids:
                    type: array
                    items:
                      type: integer
        "400":
          description: 參數驗證失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                emptyIds:
                  summary: ids 為空陣列
                  value:
                    code: rest_invalid_param
                    message: "ids 不可為空陣列"
                    data:
                      status: 400
        "403":
          $ref: '#/components/responses/403PreconditionFailed'

  # ----------------------------------------------------------
  # /chapters/sort  (PUT sort chapters)
  # ----------------------------------------------------------
  /chapters/sort:
    put:
      summary: 排序章節
      operationId: sortChapters
      tags: [Chapters]
      description: |
        批量更新章節的 `menu_order`（拖拽排序後呼叫）。

        **前置（狀態）:** `chapters` 中每個 `id` 對應的章節都必須存在

        **前置（參數）:**
        - `chapters` 不可為空陣列
        - 每項必須包含有效的 `id` 與 `menu_order`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - chapters
              properties:
                chapters:
                  type: array
                  minItems: 1
                  description: 章節排序陣列
                  items:
                    type: object
                    required:
                      - id
                      - menu_order
                    properties:
                      id:
                        type: integer
                        description: 章節 ID
                      menu_order:
                        type: integer
                        description: 新的排序值
                  example:
                    - id: 202
                      menu_order: 1
                    - id: 200
                      menu_order: 2
                    - id: 201
                      menu_order: 3
      responses:
        "200":
          description: 章節排序更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        "400":
          description: 參數驗證失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                emptyChapters:
                  summary: chapters 為空陣列
                  value:
                    code: rest_invalid_param
                    message: "chapters 不可為空陣列"
                    data:
                      status: 400
        "403":
          $ref: '#/components/responses/403PreconditionFailed'

  # ----------------------------------------------------------
  # /chapters/{id}  (POST update + DELETE single)
  # ----------------------------------------------------------
  /chapters/{id}:
    post:
      summary: 更新章節
      operationId: updateChapter
