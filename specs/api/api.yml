  # ----------------------------------------------------------
  # /toggle-finish-chapters/{id}  (POST)
  # 學員手動切換章節完成狀態；亦被 Player.tsx 自動完成機制呼叫
  # ----------------------------------------------------------
  /toggle-finish-chapters/{id}:
    post:
      summary: 切換章節完成狀態
      operationId: toggleFinishChapter
      tags: [Progress]
      description: |
        切換指定章節的完成狀態（toggle）：
        - 若先前有 `finished_at`：清除 `pc_avl_chaptermeta.finished_at`，觸發 `power_course_chapter_unfinished` action
        - 若先前無 `finished_at`：寫入 `finished_at = wp_date('Y-m-d H:i:s')`，觸發 `power_course_chapter_finished` action

        完成章節會：
        1. 寫 StudentLog（log_type = `chapter_finish` / `chapter_unfinished`）
        2. 重新計算課程進度；若達 100%，觸發 `power_course_course_finished` action
        3. 清除 `pc_course_progress:pid_{course}_uid_{user}` 快取
        4. 回傳更新後的進度百分比與 icon HTML（供前端即時更新 UI）
        5. **（線性觀看）** 若課程啟用 `enable_linear_viewing`，回傳 `unlocked_chapter_ids` 和 `locked_chapter_ids`

        **前置（狀態）:**
        - 用戶必須登入（`is_user_logged_in`）
        - **（線性觀看）** 若課程啟用線性觀看且為標記完成操作（非取消），章節必須處於解鎖狀態，否則回傳 403

        **前置（參數）:** `course_id` 為必填
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: 章節 ID
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - course_id
              properties:
                course_id:
                  type: integer
      responses:
        "200":
          description: 切換成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: "200"
                  message:
                    type: string
                    example: "單元 《第一章》 已標示為完成！"
                  data:
                    type: object
                    properties:
                      chapter_id:
                        type: integer
                      course_id:
                        type: integer
                      is_this_chapter_finished:
                        type: boolean
                      progress:
                        type: number
                        format: float
                        description: 課程當前進度百分比（0~100）
                      icon_html:
                        type: string
                        description: 章節圖示 HTML 片段（供前端即時替換）
                      unlocked_chapter_ids:
                        type: array
                        items:
                          type: integer
                        nullable: true
                        description: |
                          （線性觀看模式）切換後當前解鎖的章節 ID 列表。
                          僅在課程啟用 enable_linear_viewing 時回傳；未啟用時為 null。
                          前端據此即時更新側邊欄章節的鎖定/解鎖狀態（DOM 操作）。
                      locked_chapter_ids:
                        type: array
                        items:
                          type: integer
                        nullable: true
                        description: |
                          （線性觀看模式）切換後當前鎖定的章節 ID 列表。
                          僅在課程啟用 enable_linear_viewing 時回傳；未啟用時為 null。
        "400":
          description: 找不到課程 / 切換失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          $ref: '#/components/responses/403PreconditionFailed'

